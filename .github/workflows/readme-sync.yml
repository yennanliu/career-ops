name: README Sync Check

on:
  push:
    paths:
      - "README*.md"
      - "check-readme-sync.mjs"
      - ".github/workflows/readme-sync.yml"
  pull_request:
    paths:
      - "README*.md"
      - "check-readme-sync.mjs"
      - ".github/workflows/readme-sync.yml"

jobs:
  check-sync:
    name: Validate translated READMEs are in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check README sync
        run: node check-readme-sync.mjs
